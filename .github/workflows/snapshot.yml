name: Capture GitHub Trending

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-trending-snapshot-${{ github.repository }}
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install -r requirements.lock
      - name: Test
        run: python -m pytest -q
      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Collect
        id: collect
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          snapshot_path="$(python -m geektrend.cli)"
          printf 'snapshot_path=%s\n' "$snapshot_path" >> "$GITHUB_OUTPUT"
      - name: Publish exact snapshot
        env:
          BRANCH: ${{ github.ref_name }}
        run: python scripts/publish_snapshot.py "${{ steps.collect.outputs.snapshot_path }}" --branch "$BRANCH"
